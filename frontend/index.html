<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Lost & Found</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">Campus Lost & Found</div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#" id="navAdd">Add Item</a>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <p class="section-title">Categories</p>
            <div class="item active" id="filterAll">All</div>
            <div class="item" id="filterLost">Lost</div>
            <div class="item" id="filterFound">Found</div>

            <p class="section-title">Locations</p>
            <div class="item">Library</div>
            <div class="item">Cafeteria</div>
            <div class="item">Hostel</div>

        </aside>

        <!-- MAIN CONTENT -->
        <main class="main">

            <!-- HEADER -->
            <div class="header">
                <div>
                    <h1>Recent Listings</h1>
                    <p>Helping students reconnect with their belongings</p>
                </div>

                <button id="addBtn">+ Report Item</button>
            </div>

            <!-- CARDS GRID -->
            <div class="grid">
                <!-- JS will insert cards here -->
            </div>

        </main>

    </div>

    <script src="./script.js"></script>

</body>

</html>
